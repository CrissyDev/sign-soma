<div class="onboarding-container" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">

  <div class="logo">
    <img src="assets/WhatsApp Image 2026-03-19 at 11.36.42 AM.jpeg" 
         alt="Sign Soma Logo" 
         width="75" 
         height="75">
  </div>

  <div class="main-content">

    <div class="left">
      <h1>{{ slides[currentIndex].title }}</h1>
      <p class="desc">{{ slides[currentIndex].description }}</p>

      <div class="action-buttons">
        <button class="btn-main" routerLink="/signup">
          Get Started
        </button>

        <div class="login-prompt">
          <span>I already have an account</span>
          <button class="btn-secondary" routerLink="/login">Log In</button>
        </div>
      </div>

      <div class="dots">
        <span *ngFor="let slide of slides; let i = index"
              (click)="goToSlide(i)"
              [class.active]="i === currentIndex">
        </span>
      </div>
    </div>

    <div class="right">
      <div class="slider">
        <img [src]="slides[currentIndex].image" class="slide-img" alt="Onboarding Slide" />
      </div>
    </div>

  </div>
</div>
