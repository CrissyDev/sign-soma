<div class="auth-container">
  <div class="card">

    <h2>Login</h2>

    <input 
      type="email" 
      placeholder="Email" 
      [(ngModel)]="email"
    >

    <input 
      type="password" 
      placeholder="Password" 
      [(ngModel)]="password"
    >

    <button 
      class="primary-btn" 
      (click)="onLogin()" 
      [disabled]="isLoading"
    >
      {{ isLoading ? 'Logging in...' : 'Login' }}
    </button>

  </div>
</div>
