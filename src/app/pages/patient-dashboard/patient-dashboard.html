<div class="dashboard-wrapper">
  <div class="dashboard">

    <div class="header">
      <div class="header-left">
        <h2>Medical Consultation</h2>
        <p>Sign Language Translation</p>
      </div>

      <div class="user">
        <span>agnes001@gmail.com</span>
        <button class="logout-btn">Logout</button>
      </div>
    </div>

    <div class="content">

      <div class="camera-box">
        <div class="camera-inner">
          <video #videoElement autoplay muted playsinline class="video-feed"></video>
          <canvas #canvasElement class="canvas-overlay"></canvas>

          <div class="placeholder" *ngIf="!isCameraRunning">
            <p>Camera Ready</p>
            <small>Click start to begin sign detection</small>
          </div>
        </div>

        <button
          class="start-btn"
          [ngClass]="{ 'stop-btn': isCameraRunning }"
          (click)="toggleCamera()">
          {{ isCameraRunning ? 'Stop Recording' : 'Start Recording' }}
        </button>
      </div>

      <div class="right">
        <h3>Conversation History</h3>

        <div class="chat">
          <div *ngFor="let msg of messages" class="bubble">
            <div class="bubble-text">{{ msg.text }}</div>

            <div class="bubble-footer">
              <span class="time">{{ msg.time }}</span>
            </div>
          </div>
        </div>

        <div class="input">
          <input type="text" placeholder="Or type your message..." #messageInput />
          <button class="send-btn">Send</button>
        </div>
      </div>

    </div>
  </div>
</div>
